<!DOCTYPE html>
<html lang="es">
<head>

<body>

  <!-- NAVBAR — Responsable: Salome
       Barra de navegación fija arriba con el logo y los enlaces
       a las secciones. En móvil se convierte en menú hamburguesa. -->
  <nav class="navbar">
  </nav>

  <!-- HERO — Responsable: Salome -->
  <section id="hero">
    <h1>hola</h1>
  </section>

  <!-- HERO — Responsable: Salome -->
  <section id="propuesta_valor">
  </section>

  <!-- BENEFICIOS — Responsable: 
       Tarjetas con las ventajas principales del sistema.
       Ejemplo: "Consulta en tiempo real", "Reserva anticipada",
       "Sin desplazamientos innecesarios". -->
  <section id="beneficios">
  </section>

  <!-- CÓMO FUNCIONA — Responsable: 
       Pasos numerados que explican el flujo: buscar medicamento,
       ver disponibilidad, hacer la reserva, recoger en farmacia. -->
  <section id="como_funciona">
  </section>

  <!-- CÓMO FUNCIONA — Responsable: 
       Pasos numerados que explican el flujo: buscar medicamento,
       ver disponibilidad, hacer la reserva, recoger en farmacia. -->
  <section id="prueba_social">
  </section>

  <!-- FAQ — Responsable: 
       Preguntas frecuentes en formato acordeón (clic para abrir).
       Ejemplos: ¿Necesito registro?, ¿Es gratis?, ¿Qué EPS tienen? -->
  <section id="faq">
  </section>

  <!-- FOOTER — Responsable: 
       Pie de página con el logo, links rápidos y redes sociales. -->
  <footer id="footer">
  </footer>
